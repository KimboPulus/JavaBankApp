spring.application.name=BankApp

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bankapp}
spring.datasource.username=${DATABASE_USERNAME:bankapp}
spring.datasource.password=${DATABASE_PASSWORD:bankapp}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-with-at-least-32-characters}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
